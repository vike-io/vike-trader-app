name: CI

# Test gate for PRs/pushes. The repo had no CI before — backtest-engine bugs and
# docstring/feature drift slipped through merged PRs because nothing ran the suite.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: unit (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20  # fail fast instead of hanging to GitHub's 6h ceiling
    strategy:
      fail-fast: false   # one OS/py failing must NOT cancel the others — we want to SEE which
      matrix:
        os: [windows-latest]   # macOS/Linux paused per user directive (2026-06-11) — re-add to re-enable
        python: ["3.14"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true                  # cache uv's download store (big PySide6 wheels)
          cache-dependency-glob: "uv.lock"    # re-key only when locked deps change

      # Non-UI extras: enough for the engine / analysis / indicators / ml / ai-tool
      # tests. The `ui` extra (PySide6/pyqtgraph) is omitted here for a fast gate; the
      # UI tests run in the separate `ui-test` job below, headless via QT_QPA_PLATFORM=offscreen.
      - name: Sync dependencies
        run: uv sync --extra fast --extra analysis --extra ai --extra mcp --extra opt --extra cli

      # The Qt-free unit tree (tests/unit/{core,data,analysis,ai,tester}). Kept as its OWN
      # process, separate from the gui tree: collecting both in one run imports the PySide6/Qt
      # test modules into the non-UI interpreter and hard-segfaults on 3.14 — the unit/gui split
      # is the fix (see CLAUDE.md). `not network` drops the one live-network data test.
      - name: Run unit suite (no Qt)
        run: >
          uv run pytest -q --timeout=120 --timeout-method=thread -n auto
          tests/unit -m "not network"

  ui-test:
    name: gui (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20  # fail fast instead of hanging to GitHub's 6h ceiling
    strategy:
      fail-fast: false   # a Windows-only native crash must surface, not cancel macOS/Linux —
      matrix:            # running the GUI suite on windows-latest is the ONLY way to catch the
        os: [windows-latest]   # macOS/Linux paused per user directive (2026-06-11) — re-add to re-enable  # 0xC0000005 class Linux CI never saw.
        python: ["3.14"]
    env:
      # Headless Qt — no real display on any runner. The UI tests already opt into this platform;
      # we set it job-wide so every UI test (and PySide6 import) runs without a display, on all OSes.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
          enable-cache: true                  # cache uv's download store (big PySide6 wheels)
          cache-dependency-glob: "uv.lock"    # re-key only when locked deps change

      # PySide6 links a handful of system libs even under the offscreen platform — Linux only.
      # The Windows/macOS PySide6 wheels are self-contained (Qt bundled), so no system step there.
      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Sync dependencies (incl. the ui extra)
        run: uv sync --extra ui --extra fast --extra analysis --extra ai --extra mcp --extra opt --extra cli

      # The whole offscreen Qt tree (tests/gui/{chart,studio,panels}) in its own process — the
      # counterpart to the unit run above. `not network` drops the live data-manager test. New GUI
      # tests are auto-collected by directory (no hard-coded file list). `-n auto` (pytest-xdist) runs
      # it across all runner cores in SEPARATE processes (the suite is parallel-safe).
      #
      # NOTE: the parallel ADS/PySide6 dock-teardown crash (`CDockWidget already deleted` / native
      # worker crash) that once forced a serial split for tests/gui/panels is a py3.12/py3.13-only
      # race — the matrix is py3.14 ONLY now (the version this app actually ships/runs on), which is
      # unaffected, so the whole tree runs parallel again. The 3x retry stays to absorb a rare residual
      # GC/teardown flake (a real failure fails every attempt and stays red). See git-merge-workflow
      # memory for the four failed Python-side fix attempts and why py3.14-only is the chosen escape.
      - name: Run GUI test suite (offscreen)
        shell: bash
        run: |
          for attempt in 1 2 3; do
            echo "::group::GUI test attempt $attempt"
            uv run pytest -q --timeout=120 --timeout-method=thread -n auto tests/gui -m "not network" \
              && { echo "::endgroup::"; exit 0; }
            echo "::endgroup::"
            echo "GUI attempt $attempt failed — retrying (rare GC/teardown flake)"
          done
          exit 1

  bench:
    name: benchmarks (ubuntu · py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # PAUSED per user directive (2026-06-11): don't run benchmarks on every push — flip the
    # `if:` below back to re-enable. (Records hot-path timings from tests/bench, non-gating.)
    if: false
    steps:
      - uses: actions/checkout@v6
      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - name: Sync dependencies
        run: uv sync --extra fast --extra analysis --extra ai --extra mcp --extra opt --extra cli
      - name: Run benchmarks
        run: uv run pytest tests/bench -q --benchmark-json=bench.json
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench.json

# NOTE: matrix is py3.14 ONLY — the version this desktop app develops/runs/ships on. py3.12 & py3.13
# were dropped (2026-06-16): being a BUNDLED desktop app (Python baked into the installer, users don't
# bring their own), testing other interpreters tested a config we never run — and py3.12/3.13 were the
# ONLY versions that exposed a parallel ADS/PySide6 dock-teardown C++ crash (unfixable from Python; see
# git-merge-workflow memory). py3.14 is unaffected, so the GUI suite runs fully parallel again.
# macOS/Linux paused per user directive (2026-06-11) — re-add the OS axis to re-enable.
