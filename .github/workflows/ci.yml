name: CI

# Test gate for PRs/pushes. The repo had no CI before — backtest-engine bugs and
# docstring/feature drift slipped through merged PRs because nothing ran the suite.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      # Non-UI extras: enough for the engine / analysis / indicators / ml / ai-tool
      # tests. The `ui` extra (PySide6/pyqtgraph) is omitted here for a fast gate; the
      # UI tests run in the separate `ui-test` job below, headless via QT_QPA_PLATFORM=offscreen.
      - name: Sync dependencies
        run: uv sync --extra fast --extra analysis --extra ai --extra mcp --extra opt --extra cli

      - name: Run test suite (non-UI)
        run: >
          uv run pytest -q
          --ignore=tests/test_chartdata.py
          --ignore=tests/test_dashboard_data.py
          --ignore=tests/test_forward_ui.py
          --ignore=tests/test_overlays.py
          --ignore=tests/test_replay.py
          --ignore=tests/test_tables.py
          --ignore=tests/test_windowing.py
          --ignore=tests/test_interactive.py

  ui-test:
    runs-on: ubuntu-latest
    env:
      # Headless Qt — no xvfb needed. The UI tests already opt into this platform; we set it
      # job-wide so every UI test (and PySide6 import) runs without a display.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      # PySide6 links a handful of system libs even under the offscreen platform.
      - name: Install Qt runtime libs
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Sync dependencies (incl. the ui extra)
        run: uv sync --extra ui --extra fast --extra analysis --extra ai --extra mcp --extra opt --extra cli

      # The UI tests the non-UI job can't run: the PySide6-hard-import files it --ignores,
      # plus the *_gui suites (which importorskip away when PySide6 is absent). Add new UI
      # tests here so CI actually exercises them.
      - name: Run UI test suite (offscreen)
        run: >
          uv run pytest -q
          tests/test_chartdata.py
          tests/test_dashboard_data.py
          tests/test_forward_ui.py
          tests/test_overlays.py
          tests/test_replay.py
          tests/test_tables.py
          tests/test_windowing.py
          tests/test_interactive.py
          tests/test_alerts_gui.py
          tests/test_journal_gui.py
          tests/test_screener_gui.py
          tests/test_studio_gui.py
          tests/test_tools_gui.py
