name: CI

# Test gate for PRs/pushes. The repo had no CI before — backtest-engine bugs and
# docstring/feature drift slipped through merged PRs because nothing ran the suite.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: unit (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20  # fail fast instead of hanging to GitHub's 6h ceiling
    strategy:
      fail-fast: false   # one OS/py failing must NOT cancel the others — we want to SEE which
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}

      # Non-UI extras: enough for the engine / analysis / indicators / ml / ai-tool
      # tests. The `ui` extra (PySide6/pyqtgraph) is omitted here for a fast gate; the
      # UI tests run in the separate `ui-test` job below, headless via QT_QPA_PLATFORM=offscreen.
      - name: Sync dependencies
        run: uv sync --extra fast --extra analysis --extra ai --extra mcp --extra opt --extra cli

      # The Qt-free unit tree (tests/unit/{core,data,analysis,ai,tester}). Kept as its OWN
      # process, separate from the gui tree: collecting both in one run imports the PySide6/Qt
      # test modules into the non-UI interpreter and hard-segfaults on 3.14 — the unit/gui split
      # is the fix (see CLAUDE.md). `not network` drops the one live-network data test.
      - name: Run unit suite (no Qt)
        run: >
          uv run pytest -q --timeout=120 --timeout-method=thread
          tests/unit -m "not network"

  ui-test:
    name: gui (${{ matrix.os }} · py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20  # fail fast instead of hanging to GitHub's 6h ceiling
    strategy:
      fail-fast: false   # a Windows-only native crash must surface, not cancel macOS/Linux —
      matrix:            # running the GUI suite on windows-latest is the ONLY way to catch the
        os: [ubuntu-latest, windows-latest, macos-latest]  # 0xC0000005 class Linux CI never saw.
        python: ["3.12", "3.13"]
    env:
      # Headless Qt — no real display on any runner. The UI tests already opt into this platform;
      # we set it job-wide so every UI test (and PySide6 import) runs without a display, on all OSes.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v6

      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}

      # PySide6 links a handful of system libs even under the offscreen platform — Linux only.
      # The Windows/macOS PySide6 wheels are self-contained (Qt bundled), so no system step there.
      - name: Install Qt runtime libs (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

      - name: Sync dependencies (incl. the ui extra)
        run: uv sync --extra ui --extra fast --extra analysis --extra ai --extra mcp --extra opt --extra cli

      # The whole offscreen Qt tree (tests/gui/{chart,studio,panels}) in its own process —
      # the counterpart to the unit run above. `not network` drops the live data-manager test.
      # New GUI tests under tests/gui are picked up automatically (no hard-coded file list).
      - name: Run GUI test suite (offscreen)
        run: >
          uv run pytest -q --timeout=120 --timeout-method=thread
          tests/gui -m "not network"

  bench:
    name: benchmarks (ubuntu · py3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Records hot-path timings (tests/bench, outside the unit/gui gate) — a baseline for spotting
    # regressions. Non-gating: a slow run shouldn't block a PR. Trend-alerting (e.g.
    # benchmark-action/github-action-benchmark) is a documented follow-up that needs a store.
    steps:
      - uses: actions/checkout@v6
      - name: Install uv + Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --extra fast --extra analysis --extra ai --extra mcp --extra opt --extra cli
      - name: Run benchmarks
        run: uv run pytest tests/bench -q --benchmark-json=bench.json
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench.json

# NOTE: Python 3.14 is intentionally NOT in the matrix yet — PySide6/pyqtgraph wheel
# availability on 3.14 across all three OSes is unconfirmed (would 404 the uv sync and red the
# run). Add "3.14" to both matrices once wheels are published; the project's local dev already
# runs 3.14, so the OS axis here (esp. windows-latest) is the high-value part regardless.
